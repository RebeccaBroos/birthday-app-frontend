<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday App - Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .container h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .container p {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .button-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-container button {
            flex: 1;
            margin-top: 0;
        }

        button.hello-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        button.hello-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-header">
            <div class="emoji">🎂</div>
            <h1>Birthday Registration</h1>
            <p>Join our birthday community</p>
        </div>

        <form id="registrationForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter your name"
                    required
                >
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="your.email@example.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="birthdate">Date of Birth</label>
                <input 
                    type="date" 
                    id="birthdate" 
                    name="birthdate" 
                    required
                >
            </div>

            <button type="submit" id="submitBtn">Submit</button>
        </form>

        <div class="button-container">
            <button type="button" id="helloBtn" class="hello-btn">Say Hello</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        // Fetch backend URL from server configuration
        let BACKEND_API = 'http://localhost:5000/submit';
        let HELLO_API = 'http://localhost:5000/hello';

        // Load configuration from server
        fetch('/config')
            .then(response => response.json())
            .then(config => {
                BACKEND_API = `${config.backendUrl}/submit`;
                HELLO_API = `${config.backendUrl}/hello`;
                console.log('Backend URL loaded:', config.backendUrl);
            })
            .catch(error => {
                console.warn('Could not load config, using defaults:', error);
            });

        const form = document.getElementById('registrationForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const helloBtn = document.getElementById('helloBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get form data
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const birthdate = document.getElementById('birthdate').value;

            // Clear previous messages
            messageDiv.className = 'message';
            messageDiv.textContent = '';

            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Processing...';

            try {
                // Send data to backend
                const response = await fetch(BACKEND_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        birthdate: birthdate
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Success response
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = `<strong>Success!</strong><br>${data.message}`;
                    
                    // Reset form after success
                    form.reset();
                    
                    // Keep form open but show confirmation
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Submit';
                } else {
                    // Error response from backend
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = `<strong>Error:</strong><br>${data.error}`;
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Submit';
                }
            } catch (error) {
                // Network or parsing error
                console.error('Error:', error);
                messageDiv.className = 'message error';
                messageDiv.innerHTML = '<strong>Error:</strong><br>Failed to reach the backend service. Make sure the backend is running at ' + BACKEND_API;
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Submit';
            }
        });

        // Hello button event listener
        helloBtn.addEventListener('click', async (e) => {
            e.preventDefault();

            // Clear previous messages
            messageDiv.className = 'message';
            messageDiv.textContent = '';

            // Disable button and show loading state
            helloBtn.disabled = true;
            helloBtn.innerHTML = '<span class="spinner"></span>Sending...';

            try {
                // Send hello request to backend
                const response = await fetch(HELLO_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: 'hello'
                    })
                });

                const data = await response.json();

                if (data.message) {
                    // Success response
                    messageDiv.className = 'message info';
                    messageDiv.innerHTML = `<strong>Backend Response:</strong><br>${data.message}`;
                } else {
                    // Unexpected response format
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = '<strong>Error:</strong><br>Unexpected response from backend';
                }
                
                helloBtn.disabled = false;
                helloBtn.innerHTML = 'Say Hello';
            } catch (error) {
                // Network or parsing error
                console.error('Error:', error);
                messageDiv.className = 'message error';
                messageDiv.innerHTML = '<strong>Error:</strong><br>Backend server did not respond. Make sure the backend is running.';
                helloBtn.disabled = false;
                helloBtn.innerHTML = 'Say Hello';
            }
        });

        // Set today's date as max date in date picker
        const today = new Date();
        const maxDate = new Date(today.getFullYear() - 16, today.getMonth(), today.getDate());
        const maxDateString = maxDate.toISOString().split('T')[0];
        document.getElementById('birthdate').max = maxDateString;
    </script>
</body>
</html>
